<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- PWA / Android -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- theme-color tracks the paper background (light) and ink (dark) so
         the mobile chrome doesn't fight the warm-neutral palette. -->
    <meta name="theme-color" content="#fbf9f5" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#131110" media="(prefers-color-scheme: dark)" />

    <!-- Primary Meta -->
    <title>Vulos Office</title>
    <meta name="application-name" content="Vulos Office" />
    <meta name="description" content="Vulos Office — documents, sheets, and slides in one place." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Vulos Office" />
    <meta property="og:description" content="Vulos Office — documents, sheets, and slides in one place." />
    <meta property="og:image" content="/android-chrome-512x512.png" />

    <!--
      Fonts: we use the OS's grotesque + serif via the ui-sans-serif /
      ui-serif font keywords (configured in src/design/tokens.css).
      This gives a distinctive, characterful look without shipping a webfont
      and avoids the Inter sameness of generic React apps.

      Optional upgrade: self-host "Inter Display" + "Source Serif Pro" if a
      brand wants stricter consistency across OSes. See src/design/DESIGN.md.
    -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
